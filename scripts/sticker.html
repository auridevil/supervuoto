<!doctype html>
<!-- supervuoto round sticker source. Rendered to a high-res transparent PNG.
     See README (stickers) for the render command. -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; }
  html, body { background: transparent; }
  #stage { width: 1024px; height: 1024px; }
</style>
</head>
<body>
  <div id="stage">
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="disc" cx="50%" cy="42%" r="72%">
          <stop offset="0%" stop-color="#150a30"/>
          <stop offset="55%" stop-color="#0b0618"/>
          <stop offset="100%" stop-color="#050208"/>
        </radialGradient>
        <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#67e8f9"/>
          <stop offset="50%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#f0abfc"/>
        </linearGradient>
        <clipPath id="eyeclip">
          <circle cx="512" cy="404" r="290"/>
        </clipPath>
        <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#67e8f9" flood-opacity="0.55"/>
        </filter>
        <filter id="glowRing" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#a78bfa" flood-opacity="0.55"/>
        </filter>
        <!-- text baseline -->
        <path id="urlArc" d="M 132 560 A 372 372 0 0 0 892 560" fill="none"/>
      </defs>

      <!-- disc -->
      <circle cx="512" cy="512" r="496" fill="url(#disc)"/>

      <!-- faint stars -->
      <g fill="#ece9f7">
        <circle cx="270" cy="250" r="2.2" opacity="0.9"/>
        <circle cx="760" cy="230" r="1.8" opacity="0.7" fill="#67e8f9"/>
        <circle cx="820" cy="470" r="2" opacity="0.6"/>
        <circle cx="210" cy="500" r="1.6" opacity="0.7" fill="#a78bfa"/>
        <circle cx="330" cy="760" r="1.8" opacity="0.6"/>
        <circle cx="700" cy="770" r="2" opacity="0.7" fill="#f0abfc"/>
        <circle cx="512" cy="180" r="1.6" opacity="0.6"/>
      </g>

      <!-- broken orbital ring -->
      <circle cx="512" cy="512" r="472" fill="none" stroke="#a78bfa" stroke-width="2"
              stroke-dasharray="5 18" opacity="0.5"/>

      <!-- glowing accretion rim -->
      <circle cx="512" cy="512" r="490" fill="none" stroke="url(#ring)" stroke-width="10"
              filter="url(#glowRing)"/>

      <!-- the eye -->
      <image href="/art/eye-moon.png" x="222" y="114" width="580" height="580"
             clip-path="url(#eyeclip)"/>
      <circle cx="512" cy="404" r="290" fill="none" stroke="#67e8f9" stroke-width="3" opacity="0.55"/>

      <!-- curved url -->
      <text font-family="'Major Mono Display', monospace" font-size="104"
            letter-spacing="6" fill="#ece9f7" filter="url(#glowCyan)">
        <textPath href="#urlArc" startOffset="50%" text-anchor="middle">supervuoto.org</textPath>
      </text>
    </svg>
  </div>
</body>
</html>
