<!doctype html>
<!-- supervuoto round sticker source. Rendered to a high-res transparent PNG.
     Font variant via ?f=cinzel|pirata|cormorant|marcellus|mono  (default cinzel).
     See README (stickers) for the render command. -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link id="fontlink" rel="stylesheet" href="" />
<style>
  * { margin: 0; padding: 0; }
  html, body { background: transparent; }
  #stage { width: 1024px; height: 1024px; }
  .url {
    font-family: var(--sf, 'Major Mono Display', monospace);
    font-weight: var(--sw, 400);
    font-size: var(--ss, 112px);
    letter-spacing: var(--sl, 4px);
    text-transform: uppercase;
    fill: #ece9f7;
    stroke: #ece9f7;
    stroke-width: var(--stw, 0px);
    stroke-linejoin: round;
    paint-order: stroke fill;
  }
</style>
</head>
<body>
  <div id="stage">
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="disc" cx="50%" cy="42%" r="72%">
          <stop offset="0%" stop-color="#150a30"/>
          <stop offset="55%" stop-color="#0b0618"/>
          <stop offset="100%" stop-color="#050208"/>
        </radialGradient>
        <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#67e8f9"/>
          <stop offset="50%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#f0abfc"/>
        </linearGradient>
        <clipPath id="eyeclip">
          <circle cx="512" cy="404" r="290"/>
        </clipPath>
        <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#67e8f9" flood-opacity="0.55"/>
        </filter>
        <filter id="glowRing" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#a78bfa" flood-opacity="0.55"/>
        </filter>
        <path id="urlArc" d="M 140 556 A 388 388 0 0 0 884 556" fill="none"/>
      </defs>

      <circle cx="512" cy="512" r="496" fill="url(#disc)"/>

      <g fill="#ece9f7">
        <circle cx="270" cy="250" r="2.2" opacity="0.9"/>
        <circle cx="760" cy="230" r="1.8" opacity="0.7" fill="#67e8f9"/>
        <circle cx="820" cy="470" r="2" opacity="0.6"/>
        <circle cx="210" cy="500" r="1.6" opacity="0.7" fill="#a78bfa"/>
        <circle cx="330" cy="760" r="1.8" opacity="0.6"/>
        <circle cx="700" cy="770" r="2" opacity="0.7" fill="#f0abfc"/>
        <circle cx="512" cy="180" r="1.6" opacity="0.6"/>
      </g>

      <circle cx="512" cy="512" r="470" fill="none" stroke="#a78bfa" stroke-width="3.5"
              stroke-dasharray="6 18" opacity="0.55"/>
      <circle cx="512" cy="512" r="488" fill="none" stroke="url(#ring)" stroke-width="14"
              filter="url(#glowRing)"/>

      <image href="/art/eye-moon.png" x="222" y="114" width="580" height="580"
             clip-path="url(#eyeclip)"/>
      <circle cx="512" cy="404" r="290" fill="none" stroke="#67e8f9" stroke-width="5" opacity="0.6"/>

      <text class="url" filter="url(#glowCyan)">
        <textPath href="#urlArc" startOffset="50%" text-anchor="middle">supervuoto</textPath>
      </text>
    </svg>
  </div>

  <script>
    const FONTS = {
      mono:      { fam: "'Major Mono Display', monospace", css: 'family=Major+Mono+Display',         w: 400, s: 132, l: 4, b: 3.5 },
      cinzel:    { fam: "'Cinzel Decorative', serif", css: 'family=Cinzel+Decorative:wght@700;900', w: 900, s: 88, l: 2, b: 0 },
      pirata:    { fam: "'Pirata One', system-ui",   css: 'family=Pirata+One',                      w: 400, s: 104, l: 2, b: 0 },
      cormorant: { fam: "'Cormorant Garamond', serif", css: 'family=Cormorant+Garamond:wght@700',   w: 700, s: 108, l: 4, b: 0 },
      marcellus: { fam: "'Marcellus SC', serif",     css: 'family=Marcellus+SC',                    w: 400, s: 96, l: 6, b: 0 },
    };
    const key = new URLSearchParams(location.search).get('f') || 'mono';
    const f = FONTS[key] || FONTS.mono;
    document.getElementById('fontlink').href =
      `https://fonts.googleapis.com/css2?${f.css}&display=swap`;
    const r = document.documentElement.style;
    r.setProperty('--sf', f.fam);
    r.setProperty('--sw', f.w);
    r.setProperty('--ss', f.s + 'px');
    r.setProperty('--sl', f.l + 'px');
    r.setProperty('--stw', (f.b || 0) + 'px');
  </script>
</body>
</html>
