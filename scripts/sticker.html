<!doctype html>
<!-- supervuoto round sticker source. Rendered to a high-res transparent PNG.
     Centered layout, readable type (Space Grotesk). See README (stickers). -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; }
  html, body { background: transparent; }
  #stage { width: 1024px; height: 1024px; }
  .word {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 118px;
    letter-spacing: -1px;
    fill: #ece9f7;
  }
  .tag {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 30px;
    letter-spacing: 7px;
    text-transform: uppercase;
    fill: #c9b8ff;
  }
</style>
</head>
<body>
  <div id="stage">
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="disc" cx="50%" cy="42%" r="72%">
          <stop offset="0%" stop-color="#150a30"/>
          <stop offset="55%" stop-color="#0b0618"/>
          <stop offset="100%" stop-color="#050208"/>
        </radialGradient>
        <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#67e8f9"/>
          <stop offset="50%" stop-color="#a78bfa"/>
          <stop offset="100%" stop-color="#f0abfc"/>
        </linearGradient>
        <clipPath id="eyeclip">
          <circle cx="512" cy="372" r="210"/>
        </clipPath>
        <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#67e8f9" flood-opacity="0.5"/>
        </filter>
        <filter id="glowRing" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#a78bfa" flood-opacity="0.55"/>
        </filter>
      </defs>

      <circle cx="512" cy="512" r="496" fill="url(#disc)"/>

      <g fill="#ece9f7">
        <circle cx="250" cy="240" r="2.2" opacity="0.9"/>
        <circle cx="780" cy="220" r="1.8" opacity="0.7" fill="#67e8f9"/>
        <circle cx="838" cy="470" r="2" opacity="0.6"/>
        <circle cx="196" cy="470" r="1.6" opacity="0.7" fill="#a78bfa"/>
        <circle cx="300" cy="150" r="1.6" opacity="0.6"/>
        <circle cx="720" cy="150" r="1.8" opacity="0.6" fill="#f0abfc"/>
      </g>

      <circle cx="512" cy="512" r="470" fill="none" stroke="#a78bfa" stroke-width="3"
              stroke-dasharray="6 18" opacity="0.5"/>
      <circle cx="512" cy="512" r="488" fill="none" stroke="url(#ring)" stroke-width="14"
              filter="url(#glowRing)"/>

      <!-- eye, centered on top -->
      <image href="/art/eye-moon.png" x="302" y="162" width="420" height="420"
             clip-path="url(#eyeclip)"/>
      <circle cx="512" cy="372" r="210" fill="none" stroke="#67e8f9" stroke-width="4" opacity="0.6"/>

      <!-- centered wordmark -->
      <text class="word" x="512" y="702" text-anchor="middle" filter="url(#glowCyan)">supervuoto.org</text>

      <!-- centered tagline -->
      <text class="tag" x="512" y="770" text-anchor="middle">transmissions from the super-void</text>
    </svg>
  </div>
</body>
</html>
