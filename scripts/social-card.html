<!doctype html>
<!-- Social preview card source. To regenerate public/social-card.png:
     cp scripts/social-card.html public/ && npm run preview &
     then screenshot http://localhost:4173/social-card.html at 1200x630
     (see README). Remove public/social-card.html afterwards. -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    position: relative;
    background-color: #050208;
    background-image:
      radial-gradient(ellipse 90% 80% at 20% -10%, rgba(38, 18, 70, 0.6) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 95% 110%, rgba(8, 28, 38, 0.5) 0%, transparent 60%);
    color: #ece9f7;
    font-family: 'Space Grotesk', sans-serif;
  }
  .stars { position: absolute; inset: 0; }
  .stars i {
    position: absolute;
    border-radius: 50%;
    background: #ece9f7;
  }
  .card {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    border: 14px solid transparent;
  }
  .left { flex: 1; }
  .eye {
    width: 92px; height: 92px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 0 1px rgba(167,139,250,.3), 0 0 40px rgba(240,171,252,.25);
    margin-bottom: 34px;
  }
  h1 {
    font-family: 'Major Mono Display', monospace;
    font-weight: 400;
    font-size: 84px;
    letter-spacing: 0.16em;
    text-shadow: 0 0 30px rgba(103, 232, 249, 0.35);
    margin-bottom: 18px;
  }
  .tagline {
    font-family: 'Major Mono Display', monospace;
    font-size: 21px;
    letter-spacing: 0.32em;
    color: rgba(167, 139, 250, 0.85);
    margin-bottom: 34px;
  }
  .manifesto {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.45;
    color: rgba(236, 233, 247, 0.92);
    max-width: 560px;
  }
  .manifesto em {
    font-style: normal;
    color: #67e8f9;
    text-shadow: 0 0 22px rgba(103, 232, 249, 0.5);
  }
  .url {
    margin-top: 36px;
    font-family: 'Major Mono Display', monospace;
    font-size: 19px;
    letter-spacing: 0.3em;
    color: rgba(240, 171, 252, 0.8);
  }
  .meditator {
    height: 470px;
    border: 1px solid rgba(167, 139, 250, 0.35);
    border-radius: 6px;
    transform: rotate(1.6deg);
    box-shadow: 0 24px 70px rgba(0,0,0,.7), 0 0 50px rgba(240,171,252,.18);
  }
</style>
</head>
<body>
  <div class="stars">
    <i style="left:120px;top:90px;width:3px;height:3px"></i>
    <i style="left:300px;top:520px;width:2px;height:2px;opacity:.7"></i>
    <i style="left:560px;top:60px;width:2px;height:2px;opacity:.8"></i>
    <i style="left:680px;top:560px;width:3px;height:3px;opacity:.6"></i>
    <i style="left:900px;top:120px;width:2px;height:2px"></i>
    <i style="left:1100px;top:420px;width:2px;height:2px;opacity:.7"></i>
    <i style="left:1040px;top:60px;width:3px;height:3px;opacity:.5;background:#67e8f9"></i>
    <i style="left:60px;top:380px;width:2px;height:2px;background:#a78bfa"></i>
    <i style="left:480px;top:300px;width:2px;height:2px;opacity:.5;background:#f0abfc"></i>
  </div>
  <div class="card">
    <div class="left">
      <img class="eye" src="/art/eye-moon.png" alt="" />
      <h1>supervuoto</h1>
      <div class="tagline">transmissions from the super-void</div>
      <div class="manifesto">
        Against perfection. Against definition. <em>Slop against slop.</em>
      </div>
      <div class="url">supervuoto.org</div>
    </div>
    <img class="meditator" src="/art/meditator.png" alt="" />
  </div>
</body>
</html>
